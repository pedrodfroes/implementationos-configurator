<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ImplementationOS - Digital Manufacturing Stack</title>
    <link rel="stylesheet" href="./styles.css?v=20260703-audio-player" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="./packs.js" defer></script>
    <script src="./model.js" defer></script>
    <script src="./util.js?v=20260627-claude-sync" defer></script>
    <script src="./data.js?v=20260627-master-planning" defer></script>
    <script src="./state.js?v=20260627-master-planning" defer></script>
    <script src="./derive.js?v=20260627-master-planning" defer></script>
    <script src="./generator.js?v=20260627-claude-sync" defer></script>
    <script src="./tutorial.js?v=20260703-audio-player" defer></script>
    <script src="./steps.js?v=20260627-master-planning" defer></script>
    <script src="./app.js?v=20260703-audio-player" defer></script>
  </head>
  <body class="installer-body">
    <main class="installer" id="installer">
      <aside class="rail" aria-label="Setup progress">
        <div class="rail-brand">
          <p class="eyebrow">ImplementationOS</p>
          <strong>Digital Manufacturing stack</strong>
        </div>
        <nav class="rail-steps" id="railSteps" aria-label="Steps"></nav>
        <div class="rail-foot">
          <div class="rail-readiness" id="railReadiness"></div>
        </div>
      </aside>

      <section class="stage-wrap">
        <header class="stage-top">
          <span class="stage-count" id="stageCount"></span>
          <div class="stage-top-actions">
            <button class="ghost-btn" id="cockpitToggle" type="button" title="Configuration cockpit">
              <i data-lucide="layout-grid"></i>
              <span>Cockpit</span>
            </button>
            <button class="ghost-btn" id="blueprintToggle" type="button" title="Open blueprint artifact" aria-pressed="false">
              <i data-lucide="panel-right"></i>
              <span>Blueprint</span>
            </button>
            <button class="ghost-btn" id="tutorialToggle" type="button" title="Start guided tutorial">
              <i data-lucide="sparkles"></i>
              <span>Tutorial</span>
            </button>
            <button class="ghost-btn" id="restartBtn" type="button" title="Start over">
              <i data-lucide="rotate-ccw"></i>
              <span>Start over</span>
            </button>
          </div>
        </header>

        <div class="stage-body" id="stageBody" aria-live="polite"></div>

        <footer class="stage-foot" id="stageFoot">
          <button class="ghost-btn" id="backBtn" type="button">
            <i data-lucide="arrow-left"></i>
            <span>Back</span>
          </button>
          <div class="foot-right">
            <span class="foot-hint" id="footHint"></span>
            <button class="cta" id="nextBtn" type="button">
              <span id="nextLabel">Continue</span>
              <i data-lucide="arrow-right"></i>
            </button>
          </div>
        </footer>
      </section>

      <aside class="blueprint" id="blueprintPanel" aria-label="Implementation blueprint artifact"></aside>
    </main>
  </body>
</html>
